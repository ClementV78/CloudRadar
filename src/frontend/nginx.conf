server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = / {
    add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
  }

  location / {
    try_files $uri /index.html;
  }
}
