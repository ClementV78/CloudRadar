name: bootstrap-terraform-backend

on:
  workflow_dispatch:
    inputs:
      issue_tls:
        description: "Issue a public TLS certificate with Let's Encrypt DNS-01 and store it in SSM"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required GitHub variables
        run: |
          set -euo pipefail
          BOOTSTRAP_ROLE_ARN="${{ vars.AWS_BOOTSTRAP_ROLE_ARN }}"
          REGION="${{ vars.AWS_REGION }}"
          STATE_BUCKET="${{ vars.TF_STATE_BUCKET }}"
          LOCK_TABLE="${{ vars.TF_LOCK_TABLE_NAME }}"

          missing_vars=()
          [[ -z "${BOOTSTRAP_ROLE_ARN}" ]] && missing_vars+=("AWS_BOOTSTRAP_ROLE_ARN")
          [[ -z "${REGION}" ]] && missing_vars+=("AWS_REGION")
          [[ -z "${STATE_BUCKET}" ]] && missing_vars+=("TF_STATE_BUCKET")
          [[ -z "${LOCK_TABLE}" ]] && missing_vars+=("TF_LOCK_TABLE_NAME")

          if (( ${#missing_vars[@]} > 0 )); then
            echo "Missing required GitHub Action variables: ${missing_vars[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init (local backend)
        run: terraform -chdir=infra/aws/bootstrap init -backend=false

      - name: Resolve backend inputs
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          STATE_BUCKET="${{ vars.TF_STATE_BUCKET }}"
          LOCK_TABLE="${{ vars.TF_LOCK_TABLE_NAME }}"
          BACKUP_BUCKET="${{ vars.TF_BACKUP_BUCKET_NAME }}"
          AIRCRAFT_REFERENCE_BUCKET="${{ vars.TF_AIRCRAFT_REFERENCE_BUCKET_NAME }}"
          DNS_ZONE_NAME="${{ vars.DNS_ZONE_NAME }}"
          OFFLINE_SITE_ENABLED="${{ vars.OFFLINE_SITE_ENABLED }}"
          OFFLINE_SITE_BUCKET_NAME="${{ vars.OFFLINE_SITE_BUCKET_NAME }}"
          OFFLINE_SUBDOMAIN_LABEL="${{ vars.OFFLINE_SUBDOMAIN_LABEL }}"
          OFFLINE_PRIMARY_DOMAIN_LABEL="${{ vars.OFFLINE_PRIMARY_DOMAIN_LABEL }}"
          OFFLINE_CONTACT_SENDER_LOCAL_PART="${{ vars.OFFLINE_CONTACT_SENDER_LOCAL_PART }}"
          OFFLINE_CONTACT_RECIPIENT_EMAIL="${{ vars.OFFLINE_CONTACT_RECIPIENT_EMAIL }}"
          OFFLINE_LOGS_RETENTION_DAYS="${{ vars.OFFLINE_LOGS_RETENTION_DAYS }}"
          OFFLINE_RATE_LIMIT_WINDOW_SECONDS="${{ vars.OFFLINE_RATE_LIMIT_WINDOW_SECONDS }}"
          OFFLINE_RATE_LIMIT_MAX_HITS="${{ vars.OFFLINE_RATE_LIMIT_MAX_HITS }}"
          OFFLINE_API_THROTTLE_RATE_LIMIT="${{ vars.OFFLINE_API_THROTTLE_RATE_LIMIT }}"
          OFFLINE_API_THROTTLE_BURST_LIMIT="${{ vars.OFFLINE_API_THROTTLE_BURST_LIMIT }}"
          OFFLINE_PRIMARY_HEALTH_PATH="${{ vars.OFFLINE_PRIMARY_HEALTH_PATH }}"
          OFFLINE_PRIMARY_HEALTH_PORT="${{ vars.OFFLINE_PRIMARY_HEALTH_PORT }}"
          ISSUE_TLS="${{ inputs.issue_tls }}"
          TLS_DOMAIN="${{ vars.TLS_DOMAIN }}"

          missing_vars=()
          [[ -z "${REGION}" ]] && missing_vars+=("AWS_REGION")
          [[ -z "${STATE_BUCKET}" ]] && missing_vars+=("TF_STATE_BUCKET")
          [[ -z "${LOCK_TABLE}" ]] && missing_vars+=("TF_LOCK_TABLE_NAME")

          if (( ${#missing_vars[@]} > 0 )); then
            echo "Missing required GitHub Action variables: ${missing_vars[*]}" >&2
            exit 1
          fi

          {
            echo "REGION=${REGION}"
            echo "STATE_BUCKET=${STATE_BUCKET}"
            echo "LOCK_TABLE=${LOCK_TABLE}"
            echo "ISSUE_TLS=${ISSUE_TLS}"
            echo "TLS_DOMAIN=${TLS_DOMAIN}"
            echo "TF_VAR_state_bucket_name=${STATE_BUCKET}"
            echo "TF_VAR_lock_table_name=${LOCK_TABLE}"
            echo "TF_VAR_region=${REGION}"
            echo "TF_VAR_offline_site_enabled=${OFFLINE_SITE_ENABLED:-false}"
          } >> "${GITHUB_ENV}"

          if [[ -n "${BACKUP_BUCKET}" ]]; then
            {
              echo "BACKUP_BUCKET=${BACKUP_BUCKET}"
              echo "TF_VAR_backup_bucket_name=${BACKUP_BUCKET}"
            } >> "${GITHUB_ENV}"
          fi

          if [[ -n "${AIRCRAFT_REFERENCE_BUCKET}" ]]; then
            {
              echo "AIRCRAFT_REFERENCE_BUCKET=${AIRCRAFT_REFERENCE_BUCKET}"
              echo "TF_VAR_aircraft_reference_bucket_name=${AIRCRAFT_REFERENCE_BUCKET}"
            } >> "${GITHUB_ENV}"
          fi

          if [[ -n "${DNS_ZONE_NAME}" ]]; then
            {
              echo "DNS_ZONE_NAME=${DNS_ZONE_NAME}"
              echo "TF_VAR_dns_zone_name=${DNS_ZONE_NAME}"
            } >> "${GITHUB_ENV}"
          fi

          if [[ -n "${OFFLINE_SITE_BUCKET_NAME}" ]]; then
            echo "TF_VAR_offline_site_bucket_name=${OFFLINE_SITE_BUCKET_NAME}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_SUBDOMAIN_LABEL}" ]]; then
            echo "TF_VAR_offline_subdomain_label=${OFFLINE_SUBDOMAIN_LABEL}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_PRIMARY_DOMAIN_LABEL}" ]]; then
            echo "TF_VAR_offline_primary_domain_label=${OFFLINE_PRIMARY_DOMAIN_LABEL}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_CONTACT_SENDER_LOCAL_PART}" ]]; then
            echo "TF_VAR_offline_contact_sender_local_part=${OFFLINE_CONTACT_SENDER_LOCAL_PART}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_CONTACT_RECIPIENT_EMAIL}" ]]; then
            echo "TF_VAR_offline_contact_recipient_email=${OFFLINE_CONTACT_RECIPIENT_EMAIL}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_LOGS_RETENTION_DAYS}" ]]; then
            echo "TF_VAR_offline_logs_retention_days=${OFFLINE_LOGS_RETENTION_DAYS}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_RATE_LIMIT_WINDOW_SECONDS}" ]]; then
            echo "TF_VAR_offline_rate_limit_window_seconds=${OFFLINE_RATE_LIMIT_WINDOW_SECONDS}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_RATE_LIMIT_MAX_HITS}" ]]; then
            echo "TF_VAR_offline_rate_limit_max_hits=${OFFLINE_RATE_LIMIT_MAX_HITS}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_API_THROTTLE_RATE_LIMIT}" ]]; then
            echo "TF_VAR_offline_api_throttle_rate_limit=${OFFLINE_API_THROTTLE_RATE_LIMIT}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_API_THROTTLE_BURST_LIMIT}" ]]; then
            echo "TF_VAR_offline_api_throttle_burst_limit=${OFFLINE_API_THROTTLE_BURST_LIMIT}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_PRIMARY_HEALTH_PATH}" ]]; then
            echo "TF_VAR_offline_primary_health_path=${OFFLINE_PRIMARY_HEALTH_PATH}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${OFFLINE_PRIMARY_HEALTH_PORT}" ]]; then
            echo "TF_VAR_offline_primary_health_port=${OFFLINE_PRIMARY_HEALTH_PORT}" >> "${GITHUB_ENV}"
          fi

      - name: Import existing backend resources (idempotent)
        run: |
          set -euo pipefail
          STATE_BUCKET="${STATE_BUCKET}"
          LOCK_TABLE="${LOCK_TABLE}"
          BACKUP_BUCKET="${BACKUP_BUCKET:-}"
          AIRCRAFT_REFERENCE_BUCKET="${AIRCRAFT_REFERENCE_BUCKET:-}"
          DNS_ZONE_NAME="${DNS_ZONE_NAME:-}"
          OFFLINE_SITE_ENABLED="${TF_VAR_offline_site_enabled:-false}"
          OFFLINE_SITE_BUCKET_NAME="${TF_VAR_offline_site_bucket_name:-}"
          OFFLINE_SUBDOMAIN_LABEL="${TF_VAR_offline_subdomain_label:-offline}"
          OFFLINE_PRIMARY_DOMAIN_LABEL="${TF_VAR_offline_primary_domain_label:-live}"
          OFFLINE_PRIMARY_HEALTH_PATH="${TF_VAR_offline_primary_health_path:-/statusz}"
          ZONE_ID=""

          tf_import() {
            local address="$1"
            local import_id="${2:-}"
            if [[ -z "${import_id}" || "${import_id}" == "None" || "${import_id}" == "null" ]]; then
              return 0
            fi
            terraform -chdir=infra/aws/bootstrap import "${address}" "${import_id}" || true
          }

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" >/dev/null 2>&1; then
            terraform -chdir=infra/aws/bootstrap import aws_s3_bucket.tf_state "${STATE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import aws_s3_bucket_versioning.tf_state "${STATE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import aws_s3_bucket_server_side_encryption_configuration.tf_state "${STATE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import aws_s3_bucket_public_access_block.tf_state "${STATE_BUCKET}"
          fi

          if aws dynamodb describe-table --table-name "${LOCK_TABLE}" >/dev/null 2>&1; then
            terraform -chdir=infra/aws/bootstrap import aws_dynamodb_table.tf_lock "${LOCK_TABLE}"
          fi

          if [[ -n "${BACKUP_BUCKET}" ]] && aws s3api head-bucket --bucket "${BACKUP_BUCKET}" >/dev/null 2>&1; then
            terraform -chdir=infra/aws/bootstrap import module.sqlite_backups[0].aws_s3_bucket.this "${BACKUP_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.sqlite_backups[0].aws_s3_bucket_versioning.this "${BACKUP_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.sqlite_backups[0].aws_s3_bucket_server_side_encryption_configuration.this "${BACKUP_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.sqlite_backups[0].aws_s3_bucket_public_access_block.this "${BACKUP_BUCKET}"
          fi

          if [[ -n "${AIRCRAFT_REFERENCE_BUCKET}" ]] && aws s3api head-bucket --bucket "${AIRCRAFT_REFERENCE_BUCKET}" >/dev/null 2>&1; then
            terraform -chdir=infra/aws/bootstrap import module.aircraft_reference[0].aws_s3_bucket.this "${AIRCRAFT_REFERENCE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.aircraft_reference[0].aws_s3_bucket_versioning.this "${AIRCRAFT_REFERENCE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.aircraft_reference[0].aws_s3_bucket_server_side_encryption_configuration.this "${AIRCRAFT_REFERENCE_BUCKET}"
            terraform -chdir=infra/aws/bootstrap import module.aircraft_reference[0].aws_s3_bucket_public_access_block.this "${AIRCRAFT_REFERENCE_BUCKET}"
          fi

          if [[ -n "${DNS_ZONE_NAME}" ]]; then
            # Import the hosted zone by name when it already exists, so reruns are safe.
            ZONE_ID="$(aws route53 list-hosted-zones-by-name \
              --dns-name "${DNS_ZONE_NAME}." \
              --output json | jq -r --arg name "${DNS_ZONE_NAME}." '.HostedZones[] | select(.Name==$name) | .Id' | head -n1)"
            ZONE_ID="${ZONE_ID##*/}"

            if [[ -n "${ZONE_ID}" && "${ZONE_ID}" != "null" ]]; then
              terraform -chdir=infra/aws/bootstrap import aws_route53_zone.cloudradar[0] "${ZONE_ID}"
            fi
          fi

          if [[ "${OFFLINE_SITE_ENABLED}" == "true" && -n "${DNS_ZONE_NAME}" ]]; then
            DNS_ZONE_NO_DOT="${DNS_ZONE_NAME%.}"
            OFFLINE_DOMAIN="${OFFLINE_SUBDOMAIN_LABEL}.${DNS_ZONE_NO_DOT}"
            LIVE_DOMAIN="${OFFLINE_PRIMARY_DOMAIN_LABEL}.${DNS_ZONE_NO_DOT}"
            OFFLINE_BUCKET="${OFFLINE_SITE_BUCKET_NAME:-cloudradar-offline-${DNS_ZONE_NO_DOT//./-}}"
            OFFLINE_RATE_LIMIT_TABLE="cloudradar-offline-contact-rate-limit"
            OFFLINE_LAMBDA_NAME="cloudradar-offline-contact"
            OFFLINE_LAMBDA_LOG_GROUP="/aws/lambda/cloudradar-offline-contact"

            if aws s3api head-bucket --bucket "${OFFLINE_BUCKET}" >/dev/null 2>&1; then
              tf_import aws_s3_bucket.offline_site[0] "${OFFLINE_BUCKET}"
              tf_import aws_s3_bucket_versioning.offline_site[0] "${OFFLINE_BUCKET}"
              tf_import aws_s3_bucket_server_side_encryption_configuration.offline_site[0] "${OFFLINE_BUCKET}"
              tf_import aws_s3_bucket_public_access_block.offline_site[0] "${OFFLINE_BUCKET}"
              tf_import aws_s3_bucket_ownership_controls.offline_site[0] "${OFFLINE_BUCKET}"
              tf_import aws_s3_bucket_policy.offline_site[0] "${OFFLINE_BUCKET}"

              for static_key in index.html styles.css app.js; do
                if aws s3api head-object --bucket "${OFFLINE_BUCKET}" --key "${static_key}" >/dev/null 2>&1; then
                  tf_import "aws_s3_object.offline_static[\"${static_key}\"]" "${OFFLINE_BUCKET}/${static_key}"
                fi
              done

              for screenshot_key in screenshots/dashboard.png screenshots/grafana-app-telemetry.png screenshots/grafana-ops.png; do
                if aws s3api head-object --bucket "${OFFLINE_BUCKET}" --key "${screenshot_key}" >/dev/null 2>&1; then
                  tf_import "aws_s3_object.offline_screenshots[\"${screenshot_key}\"]" "${OFFLINE_BUCKET}/${screenshot_key}"
                fi
              done
            fi

            if aws dynamodb describe-table --table-name "${OFFLINE_RATE_LIMIT_TABLE}" >/dev/null 2>&1; then
              tf_import aws_dynamodb_table.offline_rate_limit[0] "${OFFLINE_RATE_LIMIT_TABLE}"
            fi

            tf_import aws_ses_domain_identity.offline_sender_domain[0] "${DNS_ZONE_NO_DOT}"
            tf_import aws_ses_domain_dkim.offline_sender_domain[0] "${DNS_ZONE_NO_DOT}"

            if [[ -n "${ZONE_ID}" && "${ZONE_ID}" != "null" ]]; then
              tf_import aws_route53_record.offline_sender_domain_verification[0] "${ZONE_ID}__amazonses.${DNS_ZONE_NO_DOT}._TXT"

              mapfile -t DKIM_RECORD_NAMES < <(
                aws route53 list-resource-record-sets --hosted-zone-id "${ZONE_ID}" --output json \
                  | jq -r --arg suffix "._domainkey.${DNS_ZONE_NO_DOT}." \
                    '.ResourceRecordSets[] | select(.Type=="CNAME" and (.Name | endswith($suffix))) | .Name' \
                  | sort -u | head -n 3
              )
              for idx in "${!DKIM_RECORD_NAMES[@]}"; do
                tf_import "aws_route53_record.offline_sender_domain_dkim[${idx}]" "${ZONE_ID}_${DKIM_RECORD_NAMES[${idx}]}_CNAME"
              done
            fi

            LOG_GROUP_NAME="$(aws logs describe-log-groups \
              --log-group-name-prefix "${OFFLINE_LAMBDA_LOG_GROUP}" \
              --query "logGroups[?logGroupName=='${OFFLINE_LAMBDA_LOG_GROUP}'].logGroupName | [0]" \
              --output text 2>/dev/null || true)"
            tf_import aws_cloudwatch_log_group.offline_contact_lambda[0] "${LOG_GROUP_NAME}"

            tf_import aws_lambda_function.offline_contact[0] "${OFFLINE_LAMBDA_NAME}"
            tf_import aws_lambda_permission.offline_contact_apigw[0] "${OFFLINE_LAMBDA_NAME}/AllowApiGatewayInvoke"

            ROLE_NAME="$(aws iam list-roles \
              --query "Roles[?starts_with(RoleName, 'cloudradar-offline-contact-lambda-')].RoleName | [0]" \
              --output text 2>/dev/null || true)"
            tf_import aws_iam_role.offline_contact_lambda[0] "${ROLE_NAME}"

            if [[ -n "${ROLE_NAME}" && "${ROLE_NAME}" != "None" && "${ROLE_NAME}" != "null" ]]; then
              POLICY_NAME="$(aws iam list-role-policies --role-name "${ROLE_NAME}" --query "PolicyNames[0]" --output text 2>/dev/null || true)"
              tf_import aws_iam_role_policy.offline_contact_lambda[0] "${ROLE_NAME}:${POLICY_NAME}"
            fi

            API_ID="$(aws apigatewayv2 get-apis --query "Items[?Name=='cloudradar-offline-contact'].ApiId | [0]" --output text 2>/dev/null || true)"
            tf_import aws_apigatewayv2_api.offline_contact[0] "${API_ID}"
            tf_import aws_apigatewayv2_stage.offline_contact[0] "${API_ID}/\$default"

            if [[ -n "${API_ID}" && "${API_ID}" != "None" && "${API_ID}" != "null" ]]; then
              ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "${API_ID}" --query "Items[?RouteKey=='POST /api/contact-demo'].RouteId | [0]" --output text 2>/dev/null || true)"
              INTEGRATION_ID="$(aws apigatewayv2 get-integrations --api-id "${API_ID}" --query "Items[?contains(IntegrationUri, 'cloudradar-offline-contact')].IntegrationId | [0]" --output text 2>/dev/null || true)"
              tf_import aws_apigatewayv2_route.offline_contact[0] "${API_ID}/${ROUTE_ID}"
              tf_import aws_apigatewayv2_integration.offline_contact[0] "${API_ID}/${INTEGRATION_ID}"
            fi

            CERT_ARN="$(aws acm list-certificates \
              --certificate-statuses ISSUED PENDING_VALIDATION \
              --query "CertificateSummaryList[?DomainName=='${DNS_ZONE_NO_DOT}'].CertificateArn | [0]" \
              --output text 2>/dev/null || true)"
            tf_import aws_acm_certificate.offline[0] "${CERT_ARN}"

            if [[ -n "${CERT_ARN}" && "${CERT_ARN}" != "None" && "${CERT_ARN}" != "null" && -n "${ZONE_ID}" && "${ZONE_ID}" != "null" ]]; then
              ROOT_VALIDATION_NAME="$(aws acm describe-certificate --certificate-arn "${CERT_ARN}" --query "Certificate.DomainValidationOptions[?DomainName=='${DNS_ZONE_NO_DOT}'].ResourceRecord.Name | [0]" --output text 2>/dev/null || true)"
              OFFLINE_VALIDATION_NAME="$(aws acm describe-certificate --certificate-arn "${CERT_ARN}" --query "Certificate.DomainValidationOptions[?DomainName=='${OFFLINE_DOMAIN}'].ResourceRecord.Name | [0]" --output text 2>/dev/null || true)"
              tf_import "aws_route53_record.offline_certificate_validation[\"${DNS_ZONE_NO_DOT}\"]" "${ZONE_ID}_${ROOT_VALIDATION_NAME}_CNAME"
              tf_import "aws_route53_record.offline_certificate_validation[\"${OFFLINE_DOMAIN}\"]" "${ZONE_ID}_${OFFLINE_VALIDATION_NAME}_CNAME"
            fi

            OAC_ID="$(aws cloudfront list-origin-access-controls --query "OriginAccessControlList.Items[?Name=='cloudradar-offline-oac'].Id | [0]" --output text 2>/dev/null || true)"
            tf_import aws_cloudfront_origin_access_control.offline_site[0] "${OAC_ID}"

            OFFLINE_DIST_ID="$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Quantity > \`0\` && contains(Aliases.Items, '${DNS_ZONE_NO_DOT}')].Id | [0]" --output text 2>/dev/null || true)"
            tf_import aws_cloudfront_distribution.offline[0] "${OFFLINE_DIST_ID}"

            if [[ -n "${ZONE_ID}" && "${ZONE_ID}" != "null" ]]; then
              tf_import aws_route53_record.offline_domain_alias[0] "${ZONE_ID}_${OFFLINE_DOMAIN}._A"
              tf_import aws_route53_record.main_failover_primary[0] "${ZONE_ID}_${DNS_ZONE_NO_DOT}._A_primary-live"
              tf_import aws_route53_record.main_failover_secondary[0] "${ZONE_ID}_${DNS_ZONE_NO_DOT}._A_secondary-offline"
            fi

            PRIMARY_HEALTH_CHECK_ID="$(aws route53 list-health-checks \
              --query "HealthChecks[?FullyQualifiedDomainName=='${LIVE_DOMAIN}' && ResourcePath=='${OFFLINE_PRIMARY_HEALTH_PATH}'].Id | [0]" \
              --output text 2>/dev/null || true)"
            tf_import aws_route53_health_check.primary_live[0] "${PRIMARY_HEALTH_CHECK_ID}"
          fi

      - name: Terraform apply (create backend)
        run: |
          # Use local backend on runner to avoid a chicken-and-egg dependency.
          BACKUP_BUCKET="${BACKUP_BUCKET:-}"
          AIRCRAFT_REFERENCE_BUCKET="${AIRCRAFT_REFERENCE_BUCKET:-}"
          DNS_ZONE_NAME="${DNS_ZONE_NAME:-}"

          APPLY_ARGS=(
            "-var=region=${REGION}"
            "-var=state_bucket_name=${STATE_BUCKET}"
            "-var=lock_table_name=${LOCK_TABLE}"
          )

          if [[ -n "${BACKUP_BUCKET}" ]]; then
            APPLY_ARGS+=("-var=backup_bucket_name=${BACKUP_BUCKET}")
          fi

          if [[ -n "${AIRCRAFT_REFERENCE_BUCKET}" ]]; then
            APPLY_ARGS+=("-var=aircraft_reference_bucket_name=${AIRCRAFT_REFERENCE_BUCKET}")
          fi

          if [[ -n "${DNS_ZONE_NAME}" ]]; then
            APPLY_ARGS+=("-var=dns_zone_name=${DNS_ZONE_NAME}")
          fi

          terraform -chdir=infra/aws/bootstrap apply -auto-approve "${APPLY_ARGS[@]}"

      - name: Validate TLS issue inputs
        if: ${{ inputs.issue_tls }}
        run: |
          set -euo pipefail
          if [[ -z "${TLS_DOMAIN}" ]]; then
            echo "tls_domain is required when issue_tls=true" >&2
            exit 1
          fi
          if [[ -z "${DNS_ZONE_NAME:-}" ]]; then
            echo "DNS_ZONE_NAME variable is required when issue_tls=true" >&2
            exit 1
          fi

          DNS_ZONE_NO_DOT="${DNS_ZONE_NAME%.}"
          if [[ "${TLS_DOMAIN}" != "${DNS_ZONE_NO_DOT}" && "${TLS_DOMAIN}" != *".${DNS_ZONE_NO_DOT}" ]]; then
            echo "tls_domain (${TLS_DOMAIN}) must be within dns_zone_name (${DNS_ZONE_NO_DOT})" >&2
            exit 1
          fi

      - name: Validate existing TLS parameters when issue_tls=false
        if: ${{ !inputs.issue_tls }}
        env:
          TLS_FULLCHAIN_PARAM: /cloudradar/edge/tls/fullchain_pem
          TLS_PRIVKEY_PARAM: /cloudradar/edge/tls/privkey_pem
        run: |
          set -euo pipefail
          CERT_PATH="$(mktemp)"
          KEY_PATH="$(mktemp)"
          trap 'rm -f "${CERT_PATH}" "${KEY_PATH}"' EXIT

          aws ssm get-parameter \
            --name "${TLS_FULLCHAIN_PARAM}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > "${CERT_PATH}"

          aws ssm get-parameter \
            --name "${TLS_PRIVKEY_PARAM}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > "${KEY_PATH}"

          # Fail fast if no valid certificate is present while TLS issuance is not requested.
          openssl x509 -in "${CERT_PATH}" -noout -checkend 0 >/dev/null
          cert_modulus_md5="$(openssl x509 -in "${CERT_PATH}" -noout -modulus | openssl md5)"
          key_modulus_md5="$(openssl rsa -in "${KEY_PATH}" -noout -modulus | openssl md5)"
          if [[ "${cert_modulus_md5}" != "${key_modulus_md5}" ]]; then
            echo "Existing SSM TLS certificate and private key do not match." >&2
            exit 1
          fi

      - name: Install certbot DNS Route53 plugin
        if: ${{ inputs.issue_tls }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y certbot python3-certbot-dns-route53

      - name: Issue TLS certificate and store in SSM Parameter Store
        if: ${{ inputs.issue_tls }}
        env:
          TLS_FULLCHAIN_PARAM: /cloudradar/edge/tls/fullchain_pem
          TLS_PRIVKEY_PARAM: /cloudradar/edge/tls/privkey_pem
          TLS_METADATA_PARAM: /cloudradar/edge/tls/metadata
        run: |
          set -euo pipefail

          CERTBOT_DIR="$(mktemp -d)"
          trap 'rm -rf "${CERTBOT_DIR}"' EXIT

          certbot certonly \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --dns-route53 \
            --key-type rsa \
            --rsa-key-size 2048 \
            --config-dir "${CERTBOT_DIR}/config" \
            --work-dir "${CERTBOT_DIR}/work" \
            --logs-dir "${CERTBOT_DIR}/logs" \
            -d "${TLS_DOMAIN}"

          FULLCHAIN_PATH="${CERTBOT_DIR}/config/live/${TLS_DOMAIN}/fullchain.pem"
          PRIVKEY_PATH="${CERTBOT_DIR}/config/live/${TLS_DOMAIN}/privkey.pem"

          if [[ ! -s "${FULLCHAIN_PATH}" || ! -s "${PRIVKEY_PATH}" ]]; then
            echo "Certificate issuance succeeded but expected cert/key files are missing." >&2
            exit 1
          fi

          put_secure_parameter_with_tier_fallback() {
            local param_name="$1"
            local source_file="$2"
            local param_value
            local stderr_file
            stderr_file="$(mktemp)"
            param_value="$(cat "${source_file}")"

            if aws ssm put-parameter \
              --name "${param_name}" \
              --type SecureString \
              --tier Standard \
              --overwrite \
              --value "${param_value}" \
              >/dev/null 2>"${stderr_file}"; then
              echo "Stored ${param_name} as SecureString (Standard tier)."
              rm -f "${stderr_file}"
              return 0
            fi

            if grep -Eiq "Standard parameters may have values with a maximum size of 4096|ValidationException|size" "${stderr_file}"; then
              aws ssm put-parameter \
                --name "${param_name}" \
                --type SecureString \
                --tier Advanced \
                --overwrite \
                --value "${param_value}" \
                >/dev/null
              echo "Stored ${param_name} as SecureString (Advanced tier fallback)."
              rm -f "${stderr_file}"
              return 0
            fi

            echo "Failed storing ${param_name}." >&2
            cat "${stderr_file}" >&2
            rm -f "${stderr_file}"
            return 1
          }

          put_secure_parameter_with_tier_fallback "${TLS_FULLCHAIN_PARAM}" "${FULLCHAIN_PATH}"
          put_secure_parameter_with_tier_fallback "${TLS_PRIVKEY_PARAM}" "${PRIVKEY_PATH}"

          NOT_AFTER="$(openssl x509 -in "${FULLCHAIN_PATH}" -noout -enddate | cut -d= -f2-)"
          FINGERPRINT_SHA256="$(openssl x509 -in "${FULLCHAIN_PATH}" -noout -fingerprint -sha256 | cut -d= -f2)"
          ISSUED_AT_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          METADATA_JSON="$(jq -cn \
            --arg domain "${TLS_DOMAIN}" \
            --arg not_after "${NOT_AFTER}" \
            --arg fingerprint_sha256 "${FINGERPRINT_SHA256}" \
            --arg issued_at "${ISSUED_AT_UTC}" \
            '{domain:$domain, not_after:$not_after, fingerprint_sha256:$fingerprint_sha256, issued_at:$issued_at, source:"letsencrypt-dns-01"}')"

          aws ssm put-parameter \
            --name "${TLS_METADATA_PARAM}" \
            --type String \
            --overwrite \
            --value "${METADATA_JSON}" \
            >/dev/null

          echo "TLS certificate issued for ${TLS_DOMAIN}."
          echo "Certificate metadata written to ${TLS_METADATA_PARAM}."
