name: Build and Push Multi-Service Images

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'VERSION'
      - '.github/workflows/build-and-push.yml'
      - 'Dockerfile*'
      - '.dockerignore'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'VERSION'
      - '.github/workflows/build-and-push.yml'
      - 'Dockerfile*'
      - '.dockerignore'

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.repository_owner }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  java-tests:
    name: Java tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - ingester
          - processor
          - dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: src/${{ matrix.service }}/pom.xml

      - name: Run Java tests + quality checks
        working-directory: ./src/${{ matrix.service }}
        run: mvn -B verify

      - name: Convert PMD / Checkstyle / ArchUnit XML to SARIF
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          REPORT_DIR="quality-reports/${{ matrix.service }}"
          RAW_DIR="${REPORT_DIR}/raw"
          mkdir -p "${RAW_DIR}"

          python3 scripts/ci/quality-to-sarif.py pmd \
            -o "${REPORT_DIR}/pmd-results.sarif" \
            --count-output "${REPORT_DIR}/pmd-count.json" \
            src/${{ matrix.service }}/target/pmd.xml
          python3 scripts/ci/quality-to-sarif.py checkstyle \
            -o "${REPORT_DIR}/checkstyle-results.sarif" \
            --count-output "${REPORT_DIR}/checkstyle-count.json" \
            src/${{ matrix.service }}/target/checkstyle-result.xml
          python3 scripts/ci/quality-to-sarif.py archunit \
            -o "${REPORT_DIR}/archunit-results.sarif" \
            --count-output "${REPORT_DIR}/archunit-count.json" \
            src/${{ matrix.service }}/target/surefire-reports/TEST-*ArchitectureTest*.xml

          if [ -f "src/${{ matrix.service }}/target/pmd.xml" ]; then
            cp "src/${{ matrix.service }}/target/pmd.xml" "${RAW_DIR}/"
          fi
          if [ -f "src/${{ matrix.service }}/target/checkstyle-result.xml" ]; then
            cp "src/${{ matrix.service }}/target/checkstyle-result.xml" "${RAW_DIR}/"
          fi
          if [ -d "src/${{ matrix.service }}/target/surefire-reports" ]; then
            find "src/${{ matrix.service }}/target/surefire-reports" \
              -maxdepth 1 \
              -type f \
              -name 'TEST-*ArchitectureTest*.xml' \
              -exec cp {} "${RAW_DIR}/" \;
          fi

      - name: Upload PMD SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: quality-reports/${{ matrix.service }}/pmd-results.sarif
          category: pmd-${{ matrix.service }}

      - name: Upload Checkstyle SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: quality-reports/${{ matrix.service }}/checkstyle-results.sarif
          category: checkstyle-${{ matrix.service }}

      - name: Upload ArchUnit SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: quality-reports/${{ matrix.service }}/archunit-results.sarif
          category: archunit-${{ matrix.service }}

      - name: Upload static analysis reports artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.service }}
          path: quality-reports
          if-no-files-found: warn

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Run frontend tests
        working-directory: ./src/frontend
        run: |
          npm ci
          npm test -- --run

  dockerfile-lint:
    name: Hadolint ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ingester
          - processor
          - frontend
          - dashboard
          - health
          - admin-scale

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install hadolint binary
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o "$HOME/.local/bin/hadolint"
          chmod +x "$HOME/.local/bin/hadolint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint service Dockerfile
        run: hadolint --failure-threshold error "src/${{ matrix.service }}/Dockerfile"

  dependency-security-scan:
    name: Trivy fs dependency scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan dependencies in src/
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
        with:
          scanners: vuln
          scan-type: fs
          scan-ref: src
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - java-tests
      - frontend-tests
      - dockerfile-lint
      - dependency-security-scan
    strategy:
      fail-fast: false
      matrix:
        service:
          - ingester
          - processor
          - frontend
          - dashboard
          - health
          - admin-scale

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load VERSION
        run: |
          set -euo pipefail
          APP_VERSION="$(tr -d ' \t\r\n' < VERSION)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Set lowercase repository name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=${{ env.APP_VERSION }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log image details
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Image built and pushed for ${{ matrix.service }}"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Repository: ${{ env.REPO_LOWER }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'

  ci-summary-report:
    name: CI summary report
    runs-on: ubuntu-latest
    if: always()
    needs:
      - java-tests
      - frontend-tests
      - dockerfile-lint
      - dependency-security-scan
      - build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download static analysis artifacts
        if: always() && needs['java-tests'].result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: quality-reports-*
          merge-multiple: true
          path: quality-reports

      - name: Publish run summary
        run: |
          {
            echo "## CI Quality Summary"
            echo ""
            echo "- Workflow: \`${GITHUB_WORKFLOW}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| Java tests | ${{ needs['java-tests'].result }} |"
            echo "| Frontend tests | ${{ needs['frontend-tests'].result }} |"
            echo "| Hadolint (Dockerfiles) | ${{ needs['dockerfile-lint'].result }} |"
            echo "| Trivy fs dependency scan | ${{ needs['dependency-security-scan'].result }} |"
            echo "| Build-and-push matrix | ${{ needs['build-and-push'].result }} |"
            echo ""

            if [ "${{ needs['java-tests'].result }}" != "success" ] || \
               [ "${{ needs['frontend-tests'].result }}" != "success" ] || \
               [ "${{ needs['dockerfile-lint'].result }}" != "success" ] || \
               [ "${{ needs['dependency-security-scan'].result }}" != "success" ]; then
              echo "❌ One or more quality gates failed. Check the job logs and annotations."
            else
              echo "✅ All quality gates passed."
            fi

            echo ""
            echo "### Static Analysis Snapshot"
            if [ "${{ needs['java-tests'].result }}" = "success" ] && [ -d "quality-reports" ]; then
              python3 scripts/ci/quality-summary.py --root quality-reports
              echo ""
              echo "Detailed XML/SARIF reports are attached as workflow artifacts: \`quality-reports-<service>\`."
            else
              echo "_Static analysis summary unavailable (java-tests failed before artifact generation)._"
            fi
            echo "- SonarCloud dashboard: https://sonarcloud.io/project/overview?id=ClementV78_CloudRadar"
          } >> "$GITHUB_STEP_SUMMARY"
